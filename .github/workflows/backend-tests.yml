name: Unified runtime tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unittest:
    # Public pull requests never execute on a persistent self-hosted machine.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: '3.12' }
      - name: Run runtime, migration, and export-safety tests
        run: |
          python3 -m unittest tests.test_agent_collab_runtime_client -v
          python3 -m unittest tests.test_agent_collab_migration -v
          python3 -m unittest tests.test_agent_collab_coordinator -v
          python3 -m unittest tests.test_public_export_safety -v
      - name: Verify active source tree
        run: python3 scripts/check-public-export-safety.py --active-tree

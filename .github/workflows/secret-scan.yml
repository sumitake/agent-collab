name: Secret scan

# Dependency-free credential scan of every tracked file. Self-contained
# (stdlib only -- no external binary download, no license) by design.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '41 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel superseded PR runs while allowing the main-branch post-merge scan to
  # complete independently.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  scan:
    # Public pull requests never execute on a persistent self-hosted machine.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: '3.12' }
      - name: Scan tracked files for credential patterns
        run: python scripts/secret_scan.py

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          fetch-depth: 0
      - name: Scan repository history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

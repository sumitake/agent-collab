name: Secret scan

# Dependency-free credential scan of every tracked file. Self-contained
# (stdlib only -- no external binary download, no license) by design.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '41 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel superseded PR runs while allowing the main-branch post-merge scan to
  # complete independently.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  scan:
    # Public pull requests never execute on a persistent self-hosted machine.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: '3.12' }
      - name: Scan tracked files for credential patterns
        run: python scripts/secret_scan.py

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out full history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Scan repository history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

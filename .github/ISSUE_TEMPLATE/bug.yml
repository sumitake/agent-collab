name: Bug report
description: Report a bug in a skill, host profile, runtime client, or workflow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For an in-flight PR with unexpected CI failures, link the PR directly instead of opening a new issue.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Skill (specify in description)
        - Host profile / signed runtime client
        - Chain orchestration
        - Plugin metadata / marketplace
        - CI workflow
        - Other / unclear
    validations:
      required: true
  - type: input
    id: skill-or-module
    attributes:
      label: Skill / module name (if applicable)
      description: e.g., `second-opinion`, `migration-doctor`, `runtime_client.py`
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, specific description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Trigger phrase used, host profile, typed runtime status, plugin/host version, and PR/commit SHA.
    validations:
      required: true
  - type: input
    id: filing-agent
    attributes:
      label: Filing agent (if applicable)
      description: Active primary id/family/runtime plus session ID or PR link.

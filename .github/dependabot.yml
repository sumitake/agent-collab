# Dependabot version-update configuration for agent-collab-plugin (the repo).
#
# One ecosystem: GitHub Actions workflows. The unified plugin is stdlib-only;
# the signed native runtime is supplied by the private build/sign pipeline.
#
# Skills are markdown only — no skill-level deps to track. If a future skill
# introduces a deps file, add an entry here.
#
# Workflow tie-in: every Dependabot PR hits the Project Decision Workflow per
# CLAUDE.md directive #2 (third-party dep change is "material" → Gemini cross-check
# required). Auto-merge for patch updates is deliberately NOT enabled — the
# cross-check loop adjudicates each one. Revisit volume after ~4-6 weeks of data.
#
# Rollback: delete this file (revert PR). Vulnerability-alerts and
# automated-security-fixes remain enabled at the repo level independently.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
